experiments:
  - name: claude-sonnet-4-6_few_shot
    model: claude-sonnet-4-6
    backend: anthropic       # "genai" | "anthropic" | "ollama"
    temperature: 0.0
    system_prompt:           # optional; leave empty for no system prompt
    reasoning: false         # enables extended thinking (genai + anthropic only; not ollama)
    shots: 1                 # 0 = zero-shot; 1 = few-shot (requires examples_path)
    slice_n: 3            # null = full dataset; int = stratified slice by mas_name
    definitions_path: ../../../data/prompts/definitions.txt
    examples_path: ../../../data/prompts/examples.txt
    dataset_path: ../../../data/MAST-Data/MAD_full_dataset.json
    genai_project: ingka-map-services-dev
    genai_location: europe-west1
    ollama_host: http://localhost:11434      # ollama only

  - name: gemini-2.5-flash_zero_shot
    model: gemini-2.5-flash
    backend: genai           # "genai" | "anthropic" | "ollama"
    temperature: 0.0
    system_prompt:           # optional; leave empty for no system prompt
    reasoning: false         # enables extended thinking (genai + anthropic only; not ollama)
    shots: 0                 # 0 = zero-shot; 1 = few-shot (requires examples_path)
    slice_n: 3            # null = full dataset; int = stratified slice by mas_name
    definitions_path: ../../../data/prompts/definitions.txt
    examples_path: ../../../data/prompts/examples.txt
    dataset_path: ../../../data/MAST-Data/MAD_full_dataset.json
    genai_project: ingka-map-services-dev
    genai_location: europe-west1
    ollama_host: http://localhost:11434      # ollama only